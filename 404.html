<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page introuvable — Jisca Fashion</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--gold:#C9A84C;--noir:#0D0D0D;--cream:#F5F0E8;--text-muted:#888;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Montserrat',sans-serif;background:var(--noir);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
    .logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--gold);letter-spacing:0.3em;margin-bottom:60px;}
    .logo span{display:block;font-size:0.5rem;letter-spacing:0.6em;color:var(--text-muted);margin-top:4px;}
    .num{font-family:'Cormorant Garamond',serif;font-size:clamp(6rem,20vw,14rem);font-weight:700;color:rgba(201,168,76,0.12);line-height:1;}
    h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,4vw,2.5rem);font-weight:300;margin:16px 0;color:var(--cream);}
    p{font-size:0.85rem;color:var(--text-muted);margin-bottom:40px;line-height:1.8;}
    .btn{display:inline-block;padding:14px 40px;background:var(--gold);color:var(--noir);font-size:0.75rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;transition:background 0.3s;}
    .btn:hover{background:#E5C97A;}
    .orb{position:fixed;width:400px;height:400px;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
  </style>
</head>
<body>
  <div class="orb"></div>
  <div>
    <div class="logo">JISCA<span>FASHION</span></div>
    <div class="num">404</div>
    <h1>Page <em style="color:var(--gold);font-style:italic">introuvable</em></h1>
    <p>Cette page n'existe pas ou a été déplacée.<br>Retournez à l'accueil pour explorer notre collection.</p>
    <a href="/" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
